<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fable Psychology - Professional psychological services">
    <meta name="theme-color" content="#2c3e50">
    
    <title>Fable Psychology</title>
    
    <!-- Stylesheets - Mobile-first approach -->
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/components.css">
    
    <!-- Animate.css for animations -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
    </nav>

    <!-- Main Content -->
    <main id="main-content">
        <!-- Home Section -->
        <section class="section hero" id="home">
            <div class="container animate__animated animate__fadeInDown animate__slow">
                <h2>Welcome to Fable Psychology</h2>
                <p class="hero-subtitle" id="hero-subtitle"><!-- Loaded from content --></p>
            </div>
        </section>

        <!-- About Section -->
        <section class="section about" id="about">
            <div class="container">
                <div class="content-two-column" id="about-columns">
                    <div id="about-content" class="content-placeholder column-item">
                        <!-- Loaded from content/about.json -->
                    </div>
                    <div id="about-image" class="column-item column-image">
                        <img src="assets/img/1.png">
                    </div>
                </div>
            </div>
        </section>

        <!-- Contact Section -->
        <section class="section contact" id="contact">
            <div class="container">
                <h2>Get in Touch</h2>
                <div id="contact-content" class="content-placeholder">
                    <!-- Loaded from content/contact.json -->
                </div>
                <form class="contact-form" id="contact-form">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
    </footer>

    <!-- Scripts -->
    <script src="js/contentLoader.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
